<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Majster – Zákazky a fotodokumentácia</title>
<meta name="theme-color" content="#28454E" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="header" id="header">
    <div class="header-icon" id="headerIcon"></div>
    <div>
      <div class="header-title f-display" id="headerTitle">MAJSTER</div>
      <div class="header-sub" id="headerSub">Kalkulačka a zákazky pre inštalatéra</div>
    </div>
  </div>

  <!-- ================= CALCULATOR VIEW ================= -->
  <div class="view" id="view-calc">
    <div class="field">
      <div class="field-label" id="ic-home">Klient</div>
      <input type="text" id="calcClientName" placeholder="Meno klienta" />
    </div>
    <div class="field">
      <div class="field-label">Telefón</div>
      <input type="text" id="calcPhone" placeholder="+421 900 000 000" />
    </div>
    <div class="field">
      <div class="field-label">Adresa zákazky</div>
      <input type="text" id="calcAddress" placeholder="Ulica, mesto" />
    </div>
    <div class="field">
      <div class="field-label">Popis práce</div>
      <textarea id="calcDescription" rows="2" placeholder="napr. výmena kohútika, oprava odpadu..."></textarea>
    </div>

    <div class="row-2">
      <div class="field">
        <div class="field-label" id="ic-clock-label">Hodiny</div>
        <input type="number" inputmode="decimal" id="calcHours" placeholder="0" />
      </div>
      <div class="field">
        <div class="field-label">Sadzba €/h</div>
        <input type="number" inputmode="decimal" id="calcHourlyRate" value="15" />
      </div>
      <div class="field">
        <div class="field-label" id="ic-truck-label">Doprava (km)</div>
        <input type="number" inputmode="decimal" id="calcKm" placeholder="0" />
      </div>
      <div class="field">
        <div class="field-label">Sadzba €/km</div>
        <input type="number" inputmode="decimal" id="calcKmRate" value="0.30" />
      </div>
    </div>

    <div class="section-label">
      <span id="ic-material-label">Materiál</span>
      <button class="btn btn-outline btn-sm" id="calcAddMaterialBtn" style="display:flex;align-items:center;gap:4px;">
        <span id="ic-plus-inline"></span> Pridať
      </button>
    </div>
    <div id="calcMaterialsList"></div>

    <div class="field" style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
      <div class="field-label" style="margin-bottom:0;" id="ic-vat-label">Som platca DPH</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="number" inputmode="decimal" id="calcVatRate" value="20" style="width:60px; display:none;" />
        <button class="switch" id="calcVatToggle"><span class="switch-knob"></span></button>
      </div>
    </div>

    <div class="card" id="calcSummary"></div>

    <div class="btn-row">
      <button class="btn btn-outline" id="calcResetBtn">Vynulovať</button>
      <button class="btn btn-primary" id="calcSaveBtn">Uložiť ako zákazku</button>
    </div>
  </div>

  <!-- ================= JOBS LIST VIEW ================= -->
  <div class="view hidden" id="view-jobs">
    <div id="jobsList"></div>
  </div>

  <!-- ================= JOB DETAIL VIEW ================= -->
  <div class="view hidden" id="view-job-detail">
    <div id="jobDetailContent"></div>
  </div>

  <!-- ================= FOLDERS LIST VIEW ================= -->
  <div class="view hidden" id="view-folders">
    <button class="btn btn-primary btn-block" id="folderCreateBtn" style="margin-bottom:14px;">+ Nový priečinok</button>
    <div id="foldersList"></div>
  </div>

  <!-- ================= FOLDER DETAIL VIEW ================= -->
  <div class="view hidden" id="view-folder-detail">
    <div id="folderDetailContent"></div>
  </div>

  <!-- ================= OVERVIEW VIEW ================= -->
  <div class="view hidden" id="view-overview">
    <div class="stats-grid">
      <div class="card stat-card">
        <div class="stat-label">Tento mesiac</div>
        <div class="stat-value" id="statMonth" style="color:var(--success);">0,00 €</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Čaká na platbu</div>
        <div class="stat-value" id="statAwaiting" style="color:var(--accent-light);">0,00 €</div>
      </div>
      <div class="card stat-card wide">
        <div class="stat-label">Aktívne zákazky</div>
        <div class="stat-value" id="statActive" style="color:var(--primary);">0</div>
      </div>
    </div>
    <div class="card">
      <div class="stat-label" style="margin-bottom:10px;">Príjem za posledných 6 mesiacov</div>
      <svg id="chartSvg" width="100%" height="160" viewBox="0 0 300 160" preserveAspectRatio="none"></svg>
      <div id="chartLabels" style="display:flex; justify-content:space-between; margin-top:6px;"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" data-nav="calc"></button>
      <button class="nav-btn" data-nav="jobs"></button>
      <button class="nav-btn" data-nav="folders"></button>
      <button class="nav-btn" data-nav="overview"></button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="modalRoot"></div>
  <input type="file" id="photoInput" accept="image/*" multiple style="display:none" />
</div>

<script src="app.js"></script>
</body>
</html>
